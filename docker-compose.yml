version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: buscas_leilao_db
    environment:
      POSTGRES_DB: buscas_leilao
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buscas_leilao_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: buscas_leilao_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/buscas_leilao
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: buscas_leilao_worker
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/buscas_leilao
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    container_name: buscas_leilao_beat
    command: celery -A app.tasks.worker beat --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - worker

  flower:
    build: .
    container_name: buscas_leilao_flower
    command: celery -A app.tasks.worker flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - worker

volumes:
  postgres_data:
  redis_data:
