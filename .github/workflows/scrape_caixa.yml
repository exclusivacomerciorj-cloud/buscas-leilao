name: Scraping Caixa Diario

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar CSV da Caixa
        run: |
          curl -L -o caixa_rj.csv "https://venda-imoveis.caixa.gov.br/listaweb/Lista_imoveis_RJ.csv"
          echo "Linhas: $(wc -l < caixa_rj.csv)"

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Importar para API
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/importar_caixa.py

      - name: Disparar analise
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          curl -s -X POST "$API_URL/api/v1/scrape/pipeline"
          echo "Pipeline disparado!"
