name: Scraping OLX Diario

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Scraping OLX
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/scrape_olx.py

      - name: Disparar analise
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          curl -s -X POST "$API_URL/api/v1/scrape/pipeline"
          echo "Pipeline disparado!"